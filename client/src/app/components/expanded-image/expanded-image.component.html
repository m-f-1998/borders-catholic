<div class="lightbox-overlay" (click)="close()">
  <div class="lightbox-content" (click)="$event.stopPropagation()">
    <button type="button" class="btn-close lightbox-close" aria-label="Close" (click)="close()"></button>

    <img
      [src]="'/api/img/' + imageURLs[index] + '?w=640&f=webp'"
      [srcset]="
        '/api/img/' + imageURLs[index] + '?w=320&f=webp 320w,' +
        '/api/img/' + imageURLs[index] + '?w=640&f=webp 640w,' +
        '/api/img/' + imageURLs[index] + '?w=1024&f=webp 1024w'
      "
      loading="lazy"
      decoding="async"
      [alt]="'Gallery Image ' + (index + 1) + ' - Expanded'"
      class="lightbox-img"
    />

    <button class="lightbox-prev" type="button" aria-label="Previous" (click)="prevImage()">
      <app-icon icon="chevron-left" />
    </button>
    <button class="lightbox-next" type="button" aria-label="Next" (click)="nextImage()">
      <app-icon icon="chevron-right" />
    </button>
  </div>
</div>
