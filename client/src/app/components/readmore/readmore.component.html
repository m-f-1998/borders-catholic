<div class="readmore-block">
  @if (subtitle()) {
    <h3 class="readmore-subtitle">{{subtitle()}}</h3>
  }
  <p class="readmore-content">
    @if (content().length > MAXLENGTH && showReadMore()) {
      @if (expanded()) {
        {{content()}}
      } @else {
        {{getCutString()}}
      }
      <button class="readmore-toggle" (click)="expand()">
        {{expanded() ? 'Collapse' : 'Expand'}}
      </button>
    } @else {
      {{content()}}
    }
  </p>
  @if (fileName() && fileURL()) {
    <div class="readmore-btn-wrapper">
      <a class="btn btn-primary border-radius-100"
        [href]="fileURL()"
        [download]="fileName()"
        target="_blank"
        rel="noopener noreferrer">{{fileName()}}</a>
    </div>
  }
</div>
