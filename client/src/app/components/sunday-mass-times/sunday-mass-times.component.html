<section class="mass-times-section" id="sunday-mass">
  <div class="container">

    <div class="section-heading">
      <h2 class="display-2 font-bold emphasis-color">Sunday Mass Times</h2>
      <div class="section-accent"></div>
      <p class="display-4 mt-3 emphasis-color">Confessions are heard 30 minutes before every Mass.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-8">
      @for ( time of massTimes(); track time.church ) {
        <div class="mass-card">
          <div class="mass-card-icon">
            <app-icon icon="church" />
          </div>
          <div class="mass-card-body">
            <h5 class="mass-card-church">{{time.church}}</h5>
            <p class="mass-card-time">{{time.time}}</p>
          </div>
        </div>
      }
    </div>

    <div class="times-notice">
      <app-icon icon="exclamation-triangle" class="notice-icon" />
      <span>Times may vary — check our latest Newsletter for updates.</span>
    </div>

    <div class="universalis-wrapper">
      <a href="https://universalis.com/mass.htm" target="_blank" rel="noopener noreferrer">
        <img src="https://universalis.com/banner.gif" alt="Universalis Mass Readings" loading="lazy" class="universalis-banner">
      </a>
    </div>

  </div>
</section>
