<app-header />

<main class="error-page">
  <div class="error-overlay"></div>
  <div class="text-center max-w-md w-full relative z-10">

    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="h-px flex-1 bg-white/20"></div>
      <app-icon icon="cross" class="text-primary opacity-60" />
      <div class="h-px flex-1 bg-white/20"></div>
    </div>

    <p class="text-9xl font-bold text-primary select-none tracking-tight leading-none mb-4">{{code}}</p>
    <h1 class="text-2xl font-semibold text-white mb-3">{{title}}</h1>
    <p class="text-white/60 mb-10 leading-relaxed">{{description}}</p>

    <a href="/" class="btn btn-primary border-radius-100">
      <app-icon icon="home" class="mr-2" />
      Go Home
    </a>

  </div>
</main>

<app-footer />
